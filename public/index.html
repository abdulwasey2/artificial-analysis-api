<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Artificial Analysis — Model Ranker</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Model Ranker</h1>
        <p class="subtitle">
          Real-time AI model benchmarks and pricing analysis.
        </p>
      </div>
    </header>

    <main class="container">
      <!-- Controls Section -->
      <div class="controls-wrapper panel">
        <div class="category-tabs" id="categoryTabs">
          <button class="tab-btn active" data-cat="llms">
            Text Models (LLMs)
          </button>
          <button class="tab-btn" data-cat="text-to-image">
            Text to Image
          </button>
          <button class="tab-btn" data-cat="image-editing">
            Image Editing
          </button>
          <button class="tab-btn" data-cat="text-to-speech">
            Text to Speech
          </button>
          <button class="tab-btn" data-cat="text-to-video">
            Text to Video
          </button>
          <button class="tab-btn" data-cat="image-to-video">
            Image to Video
          </button>
        </div>

        <div class="controls-top">
          <div class="search-box">
            <input
              id="searchInput"
              type="search"
              placeholder="Search models..."
            />
          </div>
          <div class="action-buttons">
            <button id="refreshBtn" class="btn-primary">
              Refresh <span id="refreshSpinner" class="spinner"></span>
            </button>
            <button id="viewJsonBtn" class="btn-secondary">JSON</button>
          </div>
        </div>

        <div class="controls-options">
          <label class="toggle-label">
            <input id="nullZeroChk" type="checkbox" checked />
            <span>Treat null as 0 in Sum</span>
          </label>
        </div>

        <!-- Collapsible Metrics Selection -->
        <!-- <details class="metrics-details">
          <summary>Customize Metrics & Columns</summary>
          <div class="metrics-panel">
            <div class="metrics-actions">
              <button id="selectAllBtn" class="btn-secondary" type="button">
                Select All
              </button>
            </div>
            <div class="metrics-group">
              <strong>Benchmark Metrics (Summed)</strong>
              <div id="metricsControls" class="metrics-grid"></div>
            </div>
            <div class="metrics-group">
              <strong>Advanced Info</strong>
              <div id="advMetricsControls" class="metrics-grid"></div>
            </div>
          </div>
        </details> -->

        <div class="metrics-trigger">
          <button id="openModalBtn" class="btn-secondary">
            ⚙️ Customize Benchmarks & Columns
          </button>
        </div>
      </div>

      <!-- Summary Bar -->
      <div id="summary" class="summary-bar"></div>

      <!-- Data Display -->
      <div class="data-container">
        <!-- Table for Desktop -->
        <div id="tableWrap" class="table-wrapper">
          <table id="resultsTable" class="table">
            <thead></thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>

        <!-- Cards for Mobile -->
        <div id="cardsContainer" class="cards-grid"></div>
      </div>

      <footer>
        Data provided by
        <a href="https://artificialanalysis.ai/" target="_blank"
          >Artificial Analysis</a
        >.
      </footer>
    </main>

    <!-- Metrics Modal -->
    <div id="metricsModal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Customize Metrics & Columns</h2>
          <button id="closeModalBtn" class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
          <div class="metrics-actions" style="margin-bottom: 1.5rem">
            <button id="selectAllBtn" class="btn-secondary" type="button">
              Select All
            </button>
            <button id="deselectAllBtn" class="btn-secondary" type="button">
              Deselect All
            </button>
          </div>
          <div class="metrics-group">
            <strong>Benchmark Metrics (Summed)</strong>
            <div id="metricsControls" class="metrics-grid"></div>
          </div>
          <div class="metrics-group" style="margin-top: 1.5rem">
            <strong>Advanced Info</strong>
            <div id="advMetricsControls" class="metrics-grid"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="cancelModalBtn" class="btn-secondary">Cancel</button>
          <button id="applyMetricsBtn" class="btn-primary">
            Apply Selection
          </button>
        </div>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
